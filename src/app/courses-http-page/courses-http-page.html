<section class="page-wrapper">
    <h1 class="page-title">Каталог навчальних курсів (HTTP)</h1>

    <div *ngIf="isLoading$ | async" class="loading-state">
        <div class="spinner"></div>
        <p>Завантаження курсів...</p>
    </div>

    <div *ngIf="error$ | async as errorMessage" class="error-state">
        <div class="error-icon">⚠️</div>
        <p>{{ errorMessage }}</p>
        <button class="btn-retry" (click)="retry()">Спробувати ще раз</button>
    </div>

    <ng-container *ngIf="!(isLoading$ | async) && !(error$ | async)">
        <div class="courses-grid" *ngIf="courses$ | async as courses">
            <div class="no-results" *ngIf="courses.length === 0">
                Курсів не знайдено.
            </div>

            <div class="course-card" *ngFor="let item of courses">
                <div class="card-header">
                    <span class="badge">{{ item.category }}</span>
                    <span class="time-label">{{ item.duration }} год.</span>
                </div>
                <h3 class="course-name">{{ item.title }}</h3>
                <div class="course-id">ID: {{ item.id }}</div>
            </div>
        </div>
    </ng-container>
</section>
