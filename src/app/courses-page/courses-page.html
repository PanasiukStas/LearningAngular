<section class="page-wrapper">
    <h1 class="page-title">Каталог навчальних курсів</h1>

    <div class="filter-row">
        <div class="search-box">
            <label class="form-label">Пошук за назвою</label>
            <input type="text" [formControl]="searchInput" placeholder="Який курс ви шукаєте?" class="search-input">
        </div>
        <div class="category-box">
            <label class="form-label">Категорія</label>
            <select [formControl]="categoryFilter" class="category-select">
                <option value="">Усі категорії</option>
                <option *ngFor="let cat of categories$ | async" [value]="cat">{{ cat }}</option>
            </select>
        </div>
    </div>

    <div class="add-course-section">
        <h2 class="section-title">Додати новий курс</h2>
        <form [formGroup]="courseForm" (ngSubmit)="onAddCourse()" class="course-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="title" class="form-label">Назва курсу</label>
                    <input id="title" type="text" formControlName="title"
                        placeholder="Наприклад: Angular для початківців" class="form-input">
                </div>
                <div class="form-group">
                    <label for="category" class="form-label">Категорія</label>
                    <input id="category" type="text" formControlName="category" placeholder="Наприклад: Web Dev"
                        class="form-input">
                </div>
                <div class="form-group">
                    <label for="duration" class="form-label">Тривалість</label>
                    <input id="duration" type="text" formControlName="duration" placeholder="Наприклад: 10 годин"
                        class="form-input">
                </div>
            </div>
            <button type="submit" class="btn-add" [disabled]="courseForm.invalid">Додати курс</button>
        </form>
    </div>

    <div class="courses-grid" *ngIf="coursesList$ | async as courses">

        <div class="no-results" *ngIf="courses.length === 0">
            За вашим запитом курсів не знайдено.
        </div>

        <div class="course-card" *ngFor="let item of courses">
            <div class="card-header">
                <span class="badge">{{ item.category }}</span>
                <span class="time-label">{{ item.duration }}</span>
            </div>
            <h3 class="course-name">{{ item.title }}</h3>
            <button class="btn-delete" (click)="onDeleteCourse(item.id)">Видалити</button>
        </div>

    </div>
</section>
